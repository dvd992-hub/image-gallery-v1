<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: dark square with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0d0d0d"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#c9a84c" stroke-width="2"/>

  <!-- Inner lens circle -->
  <circle cx="16" cy="16" r="5.5" fill="none" stroke="#c9a84c" stroke-width="1.5"/>

  <!-- Aperture blades (6 lines from inner to outer ring) -->
  <line x1="16" y1="5"    x2="16" y2="10.5" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="21.5" x2="16" y2="27"   stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6.3"  y1="10.5" x2="10.8" y2="13.2" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21.2" y1="18.8" x2="25.7" y2="21.5" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6.3"  y1="21.5" x2="10.8" y2="18.8" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21.2" y1="13.2" x2="25.7" y2="10.5" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Gold centre dot -->
  <circle cx="16" cy="16" r="2" fill="#c9a84c"/>
</svg>
